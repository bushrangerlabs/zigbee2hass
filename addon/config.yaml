name: "Zigbee2HASS"
description: "Reliable Zigbee for Home Assistant via zigbee-herdsman. No MQTT required."
version: "0.1.88"
slug: "zigbee2hass"
url: "https://github.com/bushrangerlabs/zigbee2hass"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
uart: true
usb: true

ports:
  8756/tcp: 8756
ports_description:
  8756/tcp: "Zigbee2HASS WebSocket API"

options:
  serial_port: "/dev/ttyUSB0"
  adapter: "auto"
  baudrate: 115200
  rtscts: false
  disable_led: false
  channel: 11
  pan_id: "0x1a62"
  network_key: "GENERATE"
  transmit_power: 20
  websocket_port: 8756
  log_level: "info"
  availability_timeout: 300
  availability_ping_interval: 60
  availability_ping_failures: 2
  startup_grace_period: 300
  startup_command_holdoff: 300
  command_timeout: 5000
  command_retries: 3
  command_retry_delay: 500
  configure_inter_device_delay: 3000
  interview_retries: 3
  interview_retry_delay: 15
  log_buffer_size: 500
  occupancy_timeout: 90
  nvram_backup: true
  nvram_backup_interval: 3600
  startup_snapshot_keep: 10
  permit_join_timeout: 254

schema:
  serial_port: str
  adapter: "list(auto|zstack|deconz|ezsp|ember|zigate|zboss)"
  baudrate: int
  rtscts: bool
  disable_led: bool
  channel: "int(11,26)"
  pan_id: str
  network_key: str
  transmit_power: "int(0,20)"
  websocket_port: port
  log_level: "list(debug|info|warning|error)"
  availability_timeout: int
  availability_ping_interval: int
  availability_ping_failures: "int(1,10)"
  startup_grace_period: int
  startup_command_holdoff: int
  command_timeout: int
  command_retries: "int(1,10)"
  command_retry_delay: int
  configure_inter_device_delay: int
  interview_retries: "int(1,10)"
  interview_retry_delay: int
  log_buffer_size: "int(100,5000)"
  occupancy_timeout: int
  nvram_backup: bool
  nvram_backup_interval: int
  startup_snapshot_keep: "int(0,50)"
  permit_join_timeout: int

environment:
  TZ: UTC

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-addon:
    name: Lint Add-on (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: addon/package-lock.json
      - run: cd addon && npm ci
      - run: cd addon && node --check src/server.js src/zigbee.js src/devices.js src/watchdog.js src/websocket.js src/config.js src/logger.js src/migration.js

  lint-integration:
    name: Lint Integration (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check custom_components/

  validate-addon:
    name: Validate Add-on Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/helpers/hassfest@master
        continue-on-error: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint-addon, lint-integration]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
